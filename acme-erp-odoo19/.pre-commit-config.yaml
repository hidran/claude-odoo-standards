repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks: [{ id: black }]
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks: [{ id: isort }]
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks: [{ id: flake8 }]
  - repo: https://github.com/OCA/pylint-odoo
    rev: v9.0.4
    hooks: [{ id: pylint_odoo }]
